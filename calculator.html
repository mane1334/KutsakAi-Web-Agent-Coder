<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center h-screen bg-gray-100 p-4">
    <div class="bg-white rounded-lg shadow-xl w-full max-w-md text-center p-6">
        <h2 class="text-2xl font-semibold mb-4">Square Calculator</h2>
        <label for="numberInput" class="block text-gray-700 mb-2">Enter a number:</label>
        <input type="number" id="numberInput" class="w-full p-3 rounded-lg shadow-sm">
        
        <button onclick="calculateSquare()" class="mt-4 bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-lg focus:outline-none">Calculate</button>
        
        <p id="result" class="text-xl font-semibold mt-4"></p>
    </div>
    <script>
        function calculateSquare() {
            const numberInput = document.getElementById('numberInput');
            const resultText = document.getElementById('result');

            if (numberInput.value !== '') {
                const number = parseFloat(numberInput.value);
                const square = number * number;
                resultText.textContent = `The square of ${number} is: ${square}`;
            } else {
                resultText.textContent = 'Please enter a valid number.';
            }
        }
    </script>
</body>
</html>
